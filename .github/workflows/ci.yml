name: CI

on:
  push:
    branches:
      - master
    paths-ignore:
      - '**/*.md'
      - '**/*.txt'
      - 'renovate.json'
      - '.editorconfig'
      - '.gitignore'
      - '.idea/**'
      - '**/*.js'
  pull_request:
    branches:
      - master
    paths-ignore:
      - '**/*.md'
      - '**/*.txt'
      - 'renovate.json'
      - '.editorconfig'
      - '.gitignore'
      - '.idea/**'
      - '**/*.js'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' || 
      (
        !startsWith(github.event.head_commit.message, '[skip ci]') && 
        (github.ref == 'refs/heads/master' || github.event_name == 'pull_request')
      )
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - name: Install system dependencies
        run: |
          sudo apt install -y gcc-multilib

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > $RUNNER_TEMP/wekit-keystore.jks

      - name: Build Release
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/master'
        env:
          WEKIT_KEYSTORE_FILE: ${{ runner.temp }}/wekit-keystore.jks
          WEKIT_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          WEKIT_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          WEKIT_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --warning-mode all --stacktrace

      - name: Upload Release
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v7
        with:
          name: wekit-apk
          path: app/build/outputs/apk/release/*.apk

  upload-telegram:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ success() && github.ref == 'refs/heads/master' }}
    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v8
        with:
          name: wekit-apk
          path: artifacts

      - name: Find APK files
        id: find_apk
        run: |
          apks=$(ls artifacts/*.apk | tr '\n' ',')
          echo "apk_paths=$apks" >> $GITHUB_OUTPUT

      - name: Send APKs via Telegram API
        env:
          BOT_TOKEN:     ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID:       ${{ secrets.TELEGRAM_CHAT_ID }}
          SHA:           ${{ github.sha }}
          COMMIT_AUTHOR: ${{ github.event.head_commit.author.name || github.actor }}
          REPO:          ${{ github.repository }}
        run: |
          caption="🎉 *检测到新的 GitHub 推送！*
          *Commit SHA:* \`${SHA}\`
          \`\`\`
          ${{ github.event.head_commit.message || 'Manual Build' }}
          \`\`\`
          *提交者* \`${COMMIT_AUTHOR}\`
          [查看详情](https://github.com/${REPO}/commit/${SHA})"
          
          apks=(artifacts/*.apk)
          
          if [ ${#apks[@]} -eq 1 ]; then
            # Single APK — use sendDocument (supports caption)
            curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendDocument" \
              -F chat_id="${CHAT_ID}" \
              -F document=@"${apks[0]}" \
              -F caption="${caption}" \
              -F parse_mode=Markdown
          else
            media_json="["
            form_args=()
            for i in "${!apks[@]}"; do
              apk="${apks[$i]}"
              name="apk${i}"
              form_args+=(-F "${name}=@${apk}")
          
              if [ $i -gt 0 ]; then media_json+=","; fi
          
              if [ $i -eq $(( ${#apks[@]} - 1 )) ]; then
                media_json+="{\"type\":\"document\",\"media\":\"attach://${name}\",\"caption\":\"${caption}\",\"parse_mode\":\"Markdown\"}"
              else
                media_json+="{\"type\":\"document\",\"media\":\"attach://${name}\"}"
              fi
            done
            media_json+="]"
          
            curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMediaGroup" \
              -F chat_id="${CHAT_ID}" \
              -F media="${media_json}" \
              "${form_args[@]}"
          fi

  patch-wechat:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ success() && github.ref == 'refs/heads/master' }}
    steps:
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > $RUNNER_TEMP/wekit-keystore.jks

      - name: Download NPatch release artifact
        run: |
          curl -L -o npatch.jar \
            "https://github.com/Ujhhgtg/NPatch/releases/download/v1/npatch.jar"
          echo "NPatch jar ready: $(ls -lh npatch.jar)"

      - name: Download WeChat APK
        run: |
          curl -L -o wechat.apk \
            "https://dldir1v6.qq.com/weixin/android/weixin8069android3040_0x28004530_arm64_1.apk"
          echo "WeChat APK ready: $(ls -lh wechat.apk)"

      - name: Download wekit APK artifact
        uses: actions/download-artifact@v8
        with:
          name: wekit-apk
          path: artifacts

      - name: Locate and stage wekit APK
        run: |
          mv artifacts/app-universal-release.apk ./wekit.apk
          echo "Wekit APK ready: $(ls -lh wekit.apk)"

      - name: Patch WeChat with NPatch
        env:
          WEKIT_KEYSTORE_FILE: ${{ runner.temp }}/wekit-keystore.jks
          WEKIT_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          WEKIT_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          WEKIT_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          java -jar ./npatch.jar \
            -p com.tencent.mm2 \
            -l 2 \
            -v \
            --provider \
            -m ./wekit.apk \
            -r ./wechat.apk \
            -k "${WEKIT_KEYSTORE_FILE}" \
            "${WEKIT_KEYSTORE_PASSWORD}" \
            wekit \
            "${WEKIT_KEY_PASSWORD}"

      - name: Upload patched WeChat APK
        uses: actions/upload-artifact@v7
        with:
          name: wechat-npatched
          path: ./wechat-*-npatched.apk
