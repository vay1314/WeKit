# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # Gradle — Android/Kotlin build system, version catalog
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "daily"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    groups:
      kotlin:
        patterns:
          - "org.jetbrains.kotlin*"
          - "org.jetbrains.kotlinx*"
          - "com.google.devtools.ksp*"
        update-types:
          - "minor"
          - "patch"
      compose:
        patterns:
          - "androidx.compose*"
          - "androidx.activity*"
          - "androidx.lifecycle*"
        update-types:
          - "minor"
          - "patch"
      androidx:
        patterns:
          - "androidx.*"
        exclude-patterns:
          - "androidx.compose*"
          - "androidx.activity*"
          - "androidx.lifecycle*"
        update-types:
          - "minor"
          - "patch"
      ktor:
        patterns:
          - "io.ktor*"
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions — CI/CD workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # Cargo — native Rust library (compiled into APK)
  - package-ecosystem: "cargo"
    directory: "/app/src/main/rust/wekit-native"
    schedule:
      interval: "daily"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    groups:
      rust-deps:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # Cargo — contrib read-receipts server (separate project)
  - package-ecosystem: "cargo"
    directory: "/contrib/wekit-read-receipts-server"
    schedule:
      interval: "daily"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    groups:
      rust-deps:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
